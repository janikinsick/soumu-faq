<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>総務部 お問い合わせチャットボット</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-app">

  <!-- ヘッダー -->
  <header class="chat-header">
    <span class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <rect x="3" y="7" width="18" height="13" rx="3" fill="white" fill-opacity=".25"/>
        <circle cx="9"  cy="13" r="1.5" fill="white"/>
        <circle cx="15" cy="13" r="1.5" fill="white"/>
        <rect x="10" y="16" width="4" height="1.5" rx=".75" fill="white"/>
        <rect x="10.5" y="3" width="3" height="4" rx="1" fill="white" fill-opacity=".4"/>
        <circle cx="12" cy="3" r="1.2" fill="white"/>
      </svg>
    </span>
    総務部 お問い合わせチャットボット
  </header>

  <!-- チャット本文（スクロール可能） -->
  <div class="chat-body" id="chat-body">
    <!-- JS が動的に生成 -->
  </div>

  <!-- 入力バー -->
  <div class="input-bar">
    <input
      type="search"
      id="search-input"
      placeholder="質問を入力してください..."
      autocomplete="off"
      spellcheck="false"
    >
    <button class="send-btn" id="send-btn" aria-label="検索">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
