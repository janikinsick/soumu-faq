<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>総務BOT - 社内FAQシステム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== チャット画面全体 ===== -->
  <div class="chat-app">

    <!-- ヘッダー（Botプロフィール） -->
    <header class="chat-header">
      <div class="bot-profile">
        <div class="bot-avatar">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="20" fill="#1a4fa0"/>
            <rect x="11" y="14" width="18" height="13" rx="3" fill="white"/>
            <rect x="15" y="18" width="3" height="3" rx="1.5" fill="#1a4fa0"/>
            <rect x="22" y="18" width="3" height="3" rx="1.5" fill="#1a4fa0"/>
            <rect x="17" y="22" width="6" height="1.5" rx="0.75" fill="#1a4fa0"/>
            <rect x="17" y="10" width="6" height="4" rx="1" fill="white"/>
            <rect x="19" y="8" width="2" height="3" rx="1" fill="white"/>
            <circle cx="20" cy="8" r="1.5" fill="#7eb3ff"/>
            <rect x="8" y="17" width="2.5" height="6" rx="1.25" fill="white"/>
            <rect x="29.5" y="17" width="2.5" height="6" rx="1.25" fill="white"/>
          </svg>
        </div>
        <div class="bot-info">
          <div class="bot-name">総務BOT</div>
          <div class="bot-status">
            <span class="status-dot"></span>
            よくある質問にお答えします
          </div>
        </div>
      </div>
      <div id="last-updated" class="header-updated"></div>
    </header>

    <!-- 検索 + フィルター -->
    <div class="search-area">
      <div class="search-row">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="#9ca3af" stroke-width="1.8"/>
            <path d="M13.5 13.5L17 17" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="search-input"
            placeholder="質問を検索..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="clear-btn" type="button" aria-label="クリア">✕</button>
        </div>
      </div>
      <div class="filter-row">
        <div id="category-filters"></div>
      </div>
    </div>

    <!-- チャット本文 -->
    <main class="chat-body">

      <!-- Botの挨拶メッセージ -->
      <div class="chat-row bot-row">
        <div class="bubble-avatar">
          <svg viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="14" fill="#1a4fa0"/>
            <rect x="7.5" y="9.5" width="13" height="9.5" rx="2.5" fill="white"/>
            <rect x="10.5" y="12.5" width="2" height="2" rx="1" fill="#1a4fa0"/>
            <rect x="15.5" y="12.5" width="2" height="2" rx="1" fill="#1a4fa0"/>
            <rect x="12" y="15.5" width="4" height="1" rx="0.5" fill="#1a4fa0"/>
            <rect x="12" y="6.5" width="4" height="3" rx="1" fill="white"/>
            <circle cx="14" cy="6" r="1" fill="#7eb3ff"/>
          </svg>
        </div>
        <div class="bubble bot-bubble greeting">
          こんにちは！総務BOTです。<br>
          下の一覧から質問を選ぶか、キーワードで検索してください。
        </div>
      </div>

      <!-- 件数表示 -->
      <div class="result-bar">
        <span id="result-count"></span>
      </div>

      <!-- FAQリスト（動的生成） -->
      <div id="faq-list"></div>

    </main>

    <!-- フッター -->
    <footer class="chat-footer">
      <p>解決しない場合は総務部（内線：1234）までお問い合わせください</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
